name: Deploy to nais
description: Deploy Valkey, HPA and application to NAIS

inputs:
  image:
    required: true
    description: Docker image to deploy

  cluster:
    required: true
    description: NAIS cluster

  config_file:
    required: true
    description: Application config file in .nais/

  vars_file:
    required: true
    description: Vars file in .nais/vars/

  hpa_file:
    required: false
    description: HPA file in .nais/hpa/
    default: ""

  deploy_valkey:
    required: false
    description: Whether to deploy Valkey
    default: "false"

runs:
  using: composite
  steps:
#    - name: Deploy Valkey
#      if: ${{ inputs.deploy_valkey == 'true' }}
#      uses: nais/deploy/actions/deploy@v2
#      continue-on-error: true
#      env:
#        CLUSTER: ${{ inputs.cluster }}
#        RESOURCE: .nais/valkey.yml
#        VARS: .nais/vars/${{ inputs.vars_file }}

    - name: Deploy HPA
      if: ${{ inputs.hpa_file != '' }}
      uses: nais/deploy/actions/deploy@v2
      continue-on-error: true
      env:
        CLUSTER: ${{ inputs.cluster }}
        RESOURCE: .nais/hpa/${{ inputs.hpa_file }}

    - name: Deploy application
      uses: nais/deploy/actions/deploy@v2
      env:
        CLUSTER: ${{ inputs.cluster }}
        RESOURCE: .nais/${{ inputs.config_file }}
        VAR: image=${{ inputs.image }}
        VARS: .nais/vars/${{ inputs.vars_file }}